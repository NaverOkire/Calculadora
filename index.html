<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Financeira</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="calculator">

      <!-- Barra de topo: histórico + tema -->
      <div class="calculator__topbar">
        <button class="key--history">Histórico</button>
        <button id="theme-toggle">☾</button>
      </div>
      <div class="calculator__history" style="display: none"></div>

      <!-- Display (clique para copiar, swipe para limpar no mobile) -->
      <div class="calculator__display">0</div>

      <!-- Abas -->
      <div class="calculator__tabs">
        <button class="tab tab--active" data-action="tab-basico">Básico</button>
        <button class="tab" data-action="tab-financeiro">Financeiro</button>
      </div>

      <!-- Painel básico -->
      <div class="calculator__keys" id="painel-basico">

        <button class="key--operator" data-action="add">+</button>
        <button class="key--operator" data-action="subtract">-</button>
        <button class="key--operator" data-action="multiply">&times;</button>
        <button class="key--operator" data-action="divide">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>

        <button>0</button>
        <button data-action="decimal">.</button>
        <button data-action="clear">AC</button>

        <!-- Linha extra: parênteses e porcentagem -->
        <button class="key--paren" data-action="paren-open">(</button>
        <button class="key--paren" data-action="paren-close">)</button>
        <button class="key--paren" data-action="percent">%</button>

        <button class="key--equal" data-action="calculate">=</button>

      </div>

      <!-- Painel financeiro -->
      <div class="calculator__financeiro" id="painel-financeiro" style="display: none">

        <!-- Juros Compostos -->
        <div class="grupo-financeiro">
          <span class="grupo-financeiro__titulo">Juros Compostos</span>
          <div class="grupo-financeiro__botoes">
            <button data-action="set-capital">Capital</button>
            <button data-action="set-taxa">Taxa %</button>
            <button data-action="set-periodos">Períodos</button>
          </div>
        </div>

        <!-- PMT -->
        <div class="grupo-financeiro">
          <span class="grupo-financeiro__titulo">Parcelas (PMT)</span>
          <div class="grupo-financeiro__botoes">
            <button data-action="set-pmt-pv">Empréstimo</button>
            <button data-action="set-pmt-taxa">Taxa PMT</button>
            <button data-action="set-pmt-periodos">Parcelas</button>
          </div>
        </div>

        <!-- FV -->
        <div class="grupo-financeiro">
          <span class="grupo-financeiro__titulo">Valor Futuro (FV)</span>
          <div class="grupo-financeiro__botoes">
            <button data-action="set-fv-aporte">Aporte</button>
            <button data-action="set-fv-taxa">Taxa FV</button>
            <button data-action="set-fv-periodos">Períodos FV</button>
          </div>
        </div>

        <!-- Taxa Equivalente -->
        <div class="grupo-financeiro">
          <span class="grupo-financeiro__titulo">Taxa Equivalente</span>
          <div class="grupo-financeiro__botoes">
            <button data-action="set-taxa-origem">Taxa %</button>
            <button data-action="set-periodo-origem">De (períodos)</button>
            <button data-action="set-periodo-dest">Para (períodos)</button>
          </div>
        </div>

        <!-- Amortização -->
        <div class="grupo-financeiro">
          <span class="grupo-financeiro__titulo">Amortização</span>
          <div class="amort-sistema">
            <button class="btn-amort-sistema selected" data-sistema="price">Price</button>
            <button class="btn-amort-sistema" data-sistema="sac">SAC</button>
          </div>
          <div class="grupo-financeiro__botoes">
            <button data-action="set-amort-pv">Empréstimo</button>
            <button data-action="set-amort-taxa">Taxa %</button>
            <button data-action="set-amort-n">Parcelas</button>
          </div>
        </div>

        <button class="key--clear-financeiro" data-action="clear">AC</button>

      </div>

    </div>
  </div>

  <!-- Modal da tabela de amortização -->
  <div id="amort-modal">
    <div class="amort-modal__box">
      <div class="amort-modal__header">
        <span id="amort-titulo">Tabela</span>
        <button id="amort-fechar">✕</button>
      </div>
      <div class="amort-modal__body">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Parcela</th>
              <th>Amortiz.</th>
              <th>Juros</th>
              <th>Saldo</th>
            </tr>
          </thead>
          <tbody id="amort-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
