<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="calculator">
         <button class="key--history">Histórico</button>
         <div class="calculator__history" style="display: none">
         </div>
      <div class="calculator__display">0</div>
      <div class="calculator__keys">
        <button class="key--operator" data-section="add">+</button>
        <button class="key--operator" data-section="subtract">-</button>
        <button class="key--operator" data-section="multiply">&times;</button>
        <button class="key--operator" data-section="divide">÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
        <button data-action="decimal">.</button>
        <button data-section="clear">AC</button>
        <button class="key--equal" data-action="calculate">=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
